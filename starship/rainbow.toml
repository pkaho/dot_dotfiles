"$schema" = 'https://starship.rs/config-schema.json'

palette = 'tribes'

format = """
[оӮ¶](color_bg_os)\
$os\
$username\
${env_var.__ShellDepthIcon}\

[оӮ° ](fg:color_bg_os bg:color_bg_path)\
$directory\
[оӮ° ](fg:color_bg_path bg:color_bg_git)\
$git_branch\
$git_status\
$git_state\
$git_commit\

[оӮ° ](fg:color_bg_git bg:color_bg_lang)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\

[оӮ° ](fg:color_bg_lang bg:color_bg_env)\
$conda\
$docker_context\
$kubernetes\
$pixi\

[оӮ° ](fg:color_bg_env bg:color_bg_time)\
$time\
$cmd_duration\

[оӮҙ](color_bg_time)\
$line_break\
$character"""

# в”Җв”Җ ж“ҚдҪңзі»з»ҹжЁЎеқ— в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[os]
disabled = false
style = 'bg:color_bg_os fg:color_fg_os'
format = '[$symbol ]($style)'

[os.symbols]
Windows          = 'у°ҚІ'
Ubuntu           = 'у°•Ҳ'
SUSE             = 'пҢ”'
Raspbian         = 'у°җҝ'
Mint             = 'у°Јӯ'
Macos            = 'у°Җө'
Manjaro          = 'пҢ’'
Linux            = 'у°ҢҪ'
Gentoo           = 'у°ЈЁ'
Fedora           = 'у°Јӣ'
Alpine           = 'пҢҖ'
Amazon           = 'пү°'
Android          = 'оңҺ'
AOSC             = 'пҢҒ'
Arch             = 'у°ЈҮ'
Artix            = 'у°ЈҮ'
EndeavourOS      = 'пҶ—'
CentOS           = 'пҢ„'
Debian           = 'у°Јҡ'
Redhat           = 'уұ„ӣ'
RedHatEnterprise = 'уұ„ӣ'
Pop              = 'пҢӘ'
Zorin            = 'пҢҜ'

[username]
disabled = false
show_always = true
style_user  = 'bg:color_bg_os fg:color_fg_os'
style_root  = 'bg:color_bg_os fg:color_fg_os'
format      = '[$user ]($style)'

[env_var.__ShellDepthIcon]
disabled    = false
variable    = "__ShellDepthIcon"
style       = 'bg:color_bg_os fg:color_fg_os'
format      = "([$env_value ]($style))"

# в”Җв”Җ зӣ®еҪ•жЁЎеқ— в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[directory]
truncation_length = 3
truncation_symbol = 'вҖҰ/'
read_only         = 'у°Ңҫ '
style             = 'bg:color_bg_path fg:color_fg_path'
read_only_style   = 'bg:color_bg_path fg:color_bg_env'
format            = '[$path ]($style)[$read_only]($read_only_style)'

# в”Җв”Җ GitжЁЎеқ— в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[git_branch]
disabled = false
symbol   = 'оңҘ'
style    = 'bg:color_bg_git fg:color_fg_git'
format   = '[$symbol $branch ]($style)'

[git_status]
disabled = false
conflicted  = ' п“ң'
stashed     = ' оөө'
deleted     = ' оӘҒ'
renamed     = ' у°‘•'
modified    = ' оёј'
typechanged = ' у°•Ғ'
staged      = ' $count:п“җ'
untracked   = ' $count:пҠң'
diverged    = ' оңЁ $ahead_count $behind_count'
ahead       = ' $count:п…Ҳ'
behind      = ' $count:п…ү'
up_to_date  = ' п’–'
style    = 'bg:color_bg_git fg:color_fg_git'
format   = '([оҳЎ$all_status($ahead_behind) ]($style))'

[git_state]
disabled = false
merge       = 'пҗҷ'
bisect      = 'пҗў'
rebase      = 'п‘ҝ'
revert      = 'у°•Ң'
cherry_pick = 'оҠӣ'
am          = 'пҗҜ'
am_or_rebase = 'п‘ҝ or пҗҜ '
style    = 'bg:color_bg_git fg:color_fg_git'
format   = '[оҳЎ $state( $progress_current/$progress_total) ]($style)'

[git_commit]
disabled           = false
only_detached      = false
tag_disabled       = false
commit_hash_length = 5
tag_symbol         = 'пҖ« '
style              = 'bg:color_bg_git fg:color_fg_git'
format             = '[оҳЎ пҗ— $hash ($tag )]($style)'

# в”Җв”Җ иҜӯиЁҖжЁЎеқ— в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[c]
symbol = 'оҳһ'
style  = 'bg:color_bg_lang fg:color_fg_lang'
format = "[$symbol $version ]($style)"

[cpp]
symbol = 'оҳқ'
style  = 'bg:color_bg_lang fg:color_fg_lang'
format = "[$symbol $version ]($style)"

[golang]
symbol = 'оҳ§'
style  = 'bg:color_bg_lang fg:color_fg_lang'
format = "[$symbol $version ]($style)"

[haskell]
symbol = 'оҳҹ'
style  = 'bg:color_bg_lang fg:color_fg_lang'
format = "[$symbol $version ]($style)"

[java]
symbol = 'оү–'
style  = 'bg:color_bg_lang fg:color_fg_lang'
format = "[$symbol $version ]($style)"

[kotlin]
symbol = 'оҳҙ'
style  = 'bg:color_bg_lang fg:color_fg_lang'
format = "[$symbol $version ]($style)"

[nodejs]
symbol = 'оңҳ'
style  = 'bg:color_bg_lang fg:color_fg_lang'
format = "[$symbol $version ]($style)"

[php]
symbol = 'оҳҲ'
style  = 'bg:color_bg_lang fg:color_fg_lang'
format = "[$symbol $version ]($style)"

[python]
symbol = 'оҳҶ'
style  = 'bg:color_bg_lang fg:color_fg_lang'
format = "[$symbol $version ]($style)"
python_binary = [['uv', 'run', '--no-python-downloads', 'python'], 'python', 'python3', '.pixi/envs/default/bin/python']

[rust]
symbol = 'оһЁ'
style  = 'bg:color_bg_lang fg:color_fg_lang'
format = "[$symbol $version ]($style)"

# в”Җв”Җ зҺҜеўғжЁЎеқ— в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[kubernetes]
disabled         = false
symbol           = 'уұғҫ'
detect_env_vars  = ['KUBECONFIG']
detect_files     = ['k8s', '.k8s', '.kube']
style            = 'bg:color_bg_env fg:color_fg_env'
format           = '[$symbol $context:$namespace ]($style)'

[docker_context]
disabled = false
symbol   = 'пҢҲ'
style    = 'bg:color_bg_env fg:color_fg_env'
format   = '[$symbol( $context) ]($style)'

[conda]
disabled    = false
symbol      = 'рҹ…’'
ignore_base = false
style       = 'bg:color_bg_env fg:color_fg_env'
format      = '[$symbol( $environment) ]($style)'

[pixi]
disabled = false
symbol   = 'у°Үҫ'
style    = 'bg:color_bg_env fg:color_fg_env'
format   = '[$symbol $version ]($style)'

# в”Җв”Җ ж—¶й—ҙжЁЎеқ— в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[time]
disabled    = false
time_format = '%R'
style       = 'fg:color_fg_time bg:color_bg_time'
format      = '[пҗә $time]($style)'

[cmd_duration]
disabled          = false
min_time          = 500
show_milliseconds = true
style             = 'fg:color_fg_time bg:color_bg_time'
format            = '[ пғ§ $duration]($style)'

# в”Җв”Җ жҸҗзӨәз¬Ұеӯ—з¬ҰжЁЎеқ— в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[line_break]
disabled = false
[character]
success_symbol = '[вқҜ](fg:bold green)[вқҜ](fg:bold orange)[вқҜ](fg:bold red)'
error_symbol   = '[вқҜ](fg:bold red)[вқҜ](fg:bold red)[вқҜ](fg:bold red)'
vimcmd_symbol             = '[вқ®](fg:bold green)[вқ®](fg:bold orange)[вқ®](fg:bold red)'
vimcmd_replace_one_symbol = '[вқ®](fg:bold yellow)[вқ®](fg:bold yellow)[вқ®](fg:bold yellow)'
vimcmd_replace_symbol     = '[вқ®](fg:bold yellow)[вқ®](fg:bold yellow)[вқ®](fg:bold yellow)'
vimcmd_visual_symbol      = '[вқ®](fg:bold cyan)[вқ®](fg:bold cyan)[вқ®](fg:bold cyan)'

# в”Җв”Җ и°ғиүІжқҝе®ҡд№ү в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

