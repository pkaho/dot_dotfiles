# monitor = <显示器名称>, <分辨率@刷新率>, <显示器位置>, <缩放>
monitor = , highres@highrr, auto, 1.666667 # `hyprctl monitors` 查看显示器信息

xwayland {
    force_zero_scaling = false # 强制 Xwayland 窗口零缩放
}

general {
    layout = dwindle # 布局选项 [dwindle/master]

    border_size = 2 # 窗口边框
    gaps_in = 5     # 窗口之间的间隙
    gaps_out = 5    # 窗口和显示器之间的间隙

    col.active_border = rgba(ff0000ee) rgba(ff6600ee) 45deg # 活动窗口的边框颜色
    col.inactive_border = rgba(595959aa) # 非活动窗口的边框颜色

    resize_on_border = true      # 通过点击和拖动边框和间隙调整窗口大小
    hover_icon_on_border = true  # 悬停在边框上时显示光标图标

    allow_tearing = false  # 用于游戏画面
}

decoration {
    rounding = 10      # 窗口圆角半径
    rounding_power = 4 # 圆角曲线平滑度, 值范围: [0.0 - 1.0]

    dim_inactive = true # 非活动窗口变暗
    dim_strength = 0.2  # 非活动窗口变暗强度
    dim_special = 0.0   # 当特殊工作区(special workspace)打开时, 屏幕其余部分的变暗强度

    # 自定义屏幕着色器的路径。可以指定一个 glsl 着色器文件(如 .frag 文件)
    # 示例文档: https://github.com/hyprwm/hyprland/blob/main/example/screenshader.frag
    # screen_shader = "" # 用于在渲染结束时应用自定义视觉效果

    active_opacity = 1     # 活动窗口的不透明度
    inactive_opacity = 1   # 非活动窗口的不透明度
    fullscreen_opacity = 1 # 全屏窗口的不透明度

    blur {
        enabled = true         # 启用模糊效果
        size = 5               # 模糊的强度(距离)
        passes = 3             # 模糊处理的次数, 次数越多，模糊效果越平滑，性能越大
        ignore_opacity = false # 忽略窗口的透明度设置
        noise = 0.01           # 增加噪点

        new_optimizations = true # 新的优化选项, 启用后可以显著提高性能
        xray = true              # 浮动窗口忽略平铺窗口的模糊效果

        contrast = 1       # 模糊区域的对比度
        brightness = 1     # 模糊区域的亮度

        popups = true                   # 启用弹窗模糊效果
        popups_ignorealpha = 0.6        # 如果右键菜单的透明度小于设定值, 则不做模糊处理 [0.0 - 1.0]
        input_methods = true            # 启用输入法模糊效果
        input_methods_ignorealpha = 0.6 # 如果输入法的透明度小于设定值, 则不做模糊处理 [0.0 - 1.0]
    }

    shadow {
        enabled = true             # 启用阴影效果
        range = 20                 # 阴影范围
        render_power = 4           # 阴影边缘衰减速度
        #ignore_window = true       # 阴影渲染忽略窗口后背, 只渲染窗口周围
        color = rgba(0, 0, 0, 0.5) # 阴影颜色和透明度
        offset = 0 2               # 阴影偏移量, 格式: x y
    }
}

animations {
    enabled = true

    # 贝塞尔动画曲线
    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.38, 0.04, 1, 0.07
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = softAcDecel, 0.26, 0.26, 0.15, 1
    bezier = md2, 0.4, 0, 0.2, 1 # use with .2s duration

    # 给窗口设置动画曲线
    animation = windows, 1, 3, md3_decel, popin 60%
    animation = windowsIn, 1, 3, md3_decel, popin 60%
    animation = windowsOut, 1, 3, md3_accel, popin 60%
    animation = border, 1, 10, default
    animation = fade, 1, 3, md3_decel
    # animation = layers, 1, 2, md3_decel, slide
    animation = layersIn, 1, 3, menu_decel, slide
    animation = layersOut, 1, 1.6, menu_accel
    animation = fadeLayersIn, 1, 2, menu_decel
    animation = fadeLayersOut, 1, 4.5, menu_accel
    animation = workspaces, 1, 7, menu_decel, slide
    # animation = workspaces, 1, 2.5, softAcDecel, slide
    # animation = workspaces, 1, 7, menu_decel, slidefade 15%
    # animation = specialWorkspace, 1, 3, md3_decel, slidefadevert 15%
    animation = specialWorkspace, 1, 3, md3_decel, slidevert
}

input {
    kb_layout = us               # 键盘布局(例如: us 美式布局)
    kb_options = grp:win_space_toggle, caps:ctrl_modifier     # 键盘映射
    numlock_by_default = true    # 默认启用 num lock
    repeat_rate = 35             # 按键重复速率(每秒重复次数)
    repeat_delay = 600           # 按键重复延迟(毫秒)

    sensitivity = 0.0             # 鼠标灵敏度 [-0.1 - 1.0]
    accel_profile = flat          # 光标加速度配置文件(adaptive/flat/custom)
    natural_scroll = false        # 自然滚动, 滚动内容而不是滚动条
    scroll_factor = 1.0           # 鼠标滚动速度

    follow_mouse = 1             # 光标移动影响窗口焦点(0: 不跟随, 1：跟随，2：边界内跟随，3：边界外跟随)
    focus_on_close = 1           # 关闭窗口时焦点行为(0: 转移到下一个窗口, 1：转移到光标下窗口)
    special_fallthrough = true   # 特殊工作区中只有浮动窗口时不阻止聚焦常规工作区窗口

    touchpad {
        natural_scroll = true         # 自然滚动, 滚动内容而不是滚动条
        disable_while_typing = true   # 打字时禁用触摸板
        scroll_factor = 0.5           # 触摸板滚动速度
        clickfinger_behavior = true   # 按下触摸板模拟鼠标行为, 1/2/3 指按下触摸板分别映射为左键/右键/中键
        tap-to-click = true           # 轻触模拟鼠标(1/2/3 指轻触分别映射为左键/右键/中键)
        tap-and-drag = true           # 拖动操作
        drag_lock = true              # 拖动锁定(短时间内抬起手指不会取消拖动), 需要 tap-and-drag = true
    }
}

gestures {
    # workspace_swipe = true                        # 启用触摸板上的工作区滑动手势
    # workspace_swipe_fingers = 3                   # 设置触摸板手势所需的手指数量
    workspace_swipe_distance = 700                # 设置触摸板手势的滑动距离(以像素为单位)
    workspace_swipe_min_speed_to_force = 5        # 设置强制切换工作区的最小速度(以像素/时间点为单位), 0 表示禁用
    workspace_swipe_cancel_ratio = 0.2            # 设置滑动完成的比例阈值(0.0 - 1.0), 超过该比例则切换工作区
    workspace_swipe_create_new = true             # 在最后一个工作区向右滑动时是否创建新工作区
    workspace_swipe_direction_lock = true         # 启用方向锁定, 当滑动超过 direction_lock_threshold 时锁定方向(仅触摸板)
    workspace_swipe_direction_lock_threshold = 10 # 设置方向锁定的滑动距离阈值(以像素为单位, 仅触摸板)
}

misc {
    disable_hyprland_logo = true  # 是否禁用 hyprland 随机 logo / 动漫背景

    font_family = LXGW Wenkai Mono  # 全局默认字体
    force_default_wallpaper = 0     # 禁用默认壁纸

    # 动态调整帧率和刷新率
    # - vfr: 允许 hyprland 根据实际需求动态调整帧率(例: 窗口内容没有变化的时候降低帧率)
    # - vrr: 允许显示器刷新率动态调整, 以匹配应用程序的帧率
    # vfr = true  # 用 vfr
    vrr = 1     # 控制显示器的 vrr(adaptive sync)[0: 关闭, 1: 开启, 2: 仅全屏]

    # dpms: 显示器长时间不使用时, dpms 可以自动关闭显示器或将其置于低功耗状态
    mouse_move_enables_dpms = true  # 如果 dpms 关闭, 鼠标移动时唤醒显示器
    key_press_enables_dpms = true   # 如果 dpms 关闭, 按键时唤醒显示器

    animate_manual_resizes = false        # 启用手动调整窗口大小/移动的动画
    animate_mouse_windowdragging = false  # 启用鼠标拖动窗口的动画(某些曲线可能导致奇怪行为)

    enable_swallow = false # 启用窗口吞噬, 当新窗口打开时, 父窗口不再可见, 直到新窗口关闭

    allow_session_lock_restore = true  # 是否允许在锁屏应用崩溃时恢复会话锁
    initial_workspace_tracking = 1     # 窗口是否在调用时的工作区打开(0: 禁用, 1：单次，2：持久)
}

# Dwindle 布局配置
dwindle {
    # pseudotile = false                  # 启用伪平铺模式(窗口看起来像平铺, 但可以自由调整大小)
    force_split = 0                     # 分割方向: [0: 跟随鼠标, 1: 向左/上分割，2: 向右/下分割]
    preserve_split = true               # 保留分割方向, 不会因为窗口布局变化
    smart_split = false                 # 如果启用, 根据光标位置精确控制分割方向(窗口分为四个三角形)
    smart_resizing = true               # 如果启用, 调整大小的方向由鼠标在窗口上的位置决定
}

plugin {
}
