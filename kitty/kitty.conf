# ====================== 字体配置 (多字体回退与Nerd Fonts图标) ======================
# 官方文档 Fonts: https://sw.kovidgoyal.net/kitty/conf/#fonts
# 使用 symbol_map 为图标专属区段强制指定 Nerd Fonts，解决中文与图标冲突问题 [citation:1][citation:4]

# 主字体：推荐使用包含连字支持的 Nerd Font
# font_family      JetBrainsMono Nerd Font Mono
font_family      FiraCode Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto

# 中文字体：指定 LXGW WenKai
# 注意：此处不直接使用中文名，而是使用字体的 PostScript 名称以确保兼容性
# 如果字体安装正确，kitty 能自动识别；若识别失败，请运行 `kitty + list-fonts` 查看确切名称
symbol_map U+4E00-U+9FFF,U+3400-U+4DBF,U+20000-U+2A6DF,U+F900-U+FAFF LXGWNeoXiHeiPlus

# Nerd Fonts 图标区段强制映射到图标字体，防止被中文字体覆盖导致显示为方框
symbol_map U+E000-U+F8FF  FiraCode Nerd Font Mono
symbol_map U+23FB-U+23FE,U+E0A0-U+E0A3,U+E0B0-U+E0C7,U+E0CA,U+E0CC,U+E0D0-U+E0D4 FiraCode Nerd Font Mono

# 字体大小 (pt)
font_size 12.0

# 关闭连字如果影响中文阅读体验；默认开启，若发现中文对齐问题可尝试禁用
# disable_ligatures never


# ======================  Rosé Pine 主题 (官方配色) ======================
# 主题来源: https://github.com/kovidgoyal/kitty-themes
# 该主题通过重写基础16色及前景背景色实现，适配亮色与暗色模式

# 基础色系
background      #191724
foreground      #e0def4

# 黑色系 (0, 8)
color0          #26233a
color8          #6e6a86

# 红色系 (1, 9)
color1          #eb6f92
color9          #eb6f92

# 绿色系 (2, 10)
color2          #31748f
color10         #31748f

# 黄色系 (3, 11)
color3          #f6c177
color11         #f6c177

# 蓝色系 (4, 12)
color4          #9ccfd8
color12         #9ccfd8

# 品红系 (5, 13)
color5          #c4a7e7
color13         #c4a7e7

# 青色系 (6, 14)
color6          #ebbcba
color14         #ebbcba

# 白色系 (7, 15)
color7          #e0def4
color15         #e0def4

# 光标与选中色
cursor          #c4a7e7
selection_background  #403d52
selection_foreground  #e0def4

# 活动窗口边框颜色
active_border_color   #c4a7e7
inactive_border_color #6e6a86


# ======================  性能与交互优化 ======================

# 滚动性能: 减少渲染延迟以提升跟手度，官方文档建议范围 [citation:3]
repaint_delay   8
input_delay     2

# 鼠标: 自动隐藏光标, 3秒无操作后隐藏
mouse_hide_wait 3.0

# 回滚行数: 适当增加历史记录
scrollback_lines 5000

# 窗口启动大小 (像素)
initial_window_width  800
initial_window_height 600

# 记住上次窗口位置 (仅X11有效，Wayland下自动忽略)
remember_window_size   yes
remember_window_position yes

# 窗口装饰: 隐藏窗口标题栏以获得更沉浸的体验 (macOS/Linux)
# 若不喜欢隐藏，请注释下行
hide_window_decorations titlebar-only

# 标签栏样式与位置
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style angled

# 关闭音频提示音
enable_audio_bell no
visual_bell_duration 0.5
visual_bell_color #8f6f92

# ======================  高级功能 ======================

# 自动检测 URL 并高亮
detect_urls yes
url_color #9ccfd8
url_style curly

# 键盘修饰键 (Mac用户建议保留默认, Linux/Win用户通常使用 ctrl+shift)
# 如果希望快捷键为 Ctrl+Shift, 保留下行; 如果希望是传统的 Ctrl+Shift (kitty默认), 也保留下行
kitty_mod ctrl+shift

# Shell 集成 (提升体验，如跳转历史命令、打开上次输出等)
shell_integration enabled

# 编码设置
term xterm-kitty
